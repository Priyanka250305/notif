version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server1:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      REDIS_URL: tcp://redis:6379
      NOTIF_CHANNEL: notifications
      CONCURRENCY: 4
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  server2:
    build: .
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      REDIS_URL: tcp://redis:6379
      NOTIF_CHANNEL: notifications
      CONCURRENCY: 4
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
